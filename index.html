<!DOCTYPE html>
<html lang="en">
<head>
  <title>Calculator</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
<div id="d1">
  <div id="container">
    <div id="inpt"><input id="ip1" onclick="current_val;document.querySelector('#ip1').value=current_val; " type="text"></div>
    <div id="btnsi" class="btnsc">
      <div id="f1d" class="f1d">
        <button id="btnC" class="btn" onclick="current_val='';document.querySelector('#ip1').value=current_val; ">C</button>
        <button id="btn+" class="btn" onclick="current_val+='+';document.querySelector('#ip1').value=current_val; ">+</button>
        <button id="btn-" class="btn" onclick="current_val+='-';document.querySelector('#ip1').value=current_val; ">-</button>
        <button id="btn*" class="btn" onclick="current_val+='*';document.querySelector('#ip1').value=current_val; ">*</button>
      </div>
      <div id="f1d" class="f1d">
        <button id="btn0" class="btn" onclick="current_val+='0';document.querySelector('#ip1').value=current_val; ">0</button>
        <button id="btn1" class="btn" onclick="current_val+='1';document.querySelector('#ip1').value=current_val; ">1</button>
        <button id="btn2" class="btn" onclick="current_val+='2';document.querySelector('#ip1').value=current_val; ">2</button>
        <button id="btn/" class="btn" onclick="current_val+='/';document.querySelector('#ip1').value=current_val; ">/</button>
      </div>
      <div id="f1d" class="f1d">
        <button id="btn3" class="btn" onclick="current_val+='3';document.querySelector('#ip1').value=current_val; ">3</button>
        <button id="btn4" class="btn" onclick="current_val+='4';document.querySelector('#ip1').value=current_val; ">4</button>
        <button id="btn5" class="btn" onclick="current_val+='5';document.querySelector('#ip1').value=current_val; ">5</button>
        <button id="btn%" class="btn" onclick="current_val+='%';document.querySelector('#ip1').value=current_val; ">%</button>
      </div>
      <div id="f1d" class="f1d">
        <button id="btn6" class="btn" onclick="current_val+='6';document.querySelector('#ip1').value=current_val; ">6</button>
        <button id="btn7" class="btn" onclick="current_val+='7';document.querySelector('#ip1').value=current_val; ">7</button>
        <button id="btn8" class="btn" onclick="current_val+='8';document.querySelector('#ip1').value=current_val; ">8</button>
        <button id="btn)" class="btn" onclick="current_val+=')';document.querySelector('#ip1').value=current_val; ">)</button>


      </div>
      <div id="f1d" class="f1d">
        <button id="btn9" class="btn" onclick="current_val+='9';document.querySelector('#ip1').value=current_val; ">9</button>
        <button id="btn." class="btn" onclick="current_val+='.';document.querySelector('#ip1').value=current_val; ">.</button>
        <button id="btn(" class="btn" onclick="current_val+='(';document.querySelector('#ip1').value=current_val; ">(</button>
        <button id="equal" class="btn" onclick="current_val=eval(current_val);document.querySelector('#ip1').value=current_val; ">=</button>

      </div>
    </div>
  </div>
</div>

  <script src="index.js">
    let current_val='0';
    document.querySelector('#ip1').value=current_val;
  </script>
</body>
</html>
